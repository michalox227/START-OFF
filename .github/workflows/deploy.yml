name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Uprawnienia potrzebne do publikacji na GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Jeden aktywny deploy naraz.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Backend Pages bywa chwilowo niedostępny ("Deployment failed, try
      # again later") albo trzyma wdrożenie w kolejce ponad 10-minutowy
      # limit akcji — dlatego po nieudanej próbie ponawiamy do dwóch razy.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Odczekaj przed ponowieniem
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (2. próba)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Odczekaj przed ostatnim ponowieniem
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: sleep 180

      - name: Deploy to GitHub Pages (3. próba)
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        uses: actions/deploy-pages@v5
